name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v5
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run check

  postgres-integration:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_USER: myskills_test
          POSTGRES_PASSWORD: myskills_test
          POSTGRES_DB: myskills_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U myskills_test -d myskills_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v5
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run test:postgres
        env:
          TEST_DATABASE_URL: postgres://myskills_test:myskills_test@localhost:5432/myskills_test
