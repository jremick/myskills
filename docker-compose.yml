services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: ai_skills_share
      POSTGRES_USER: ai_skills_share
      POSTGRES_PASSWORD: ai_skills_share_dev
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ai_skills_share -d ai_skills_share"]
      interval: 5s
      timeout: 5s
      retries: 20
    volumes:
      - postgres-data:/var/lib/postgresql/data

  minio:
    image: minio/minio:RELEASE.2025-09-07T16-13-09Z
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ai-skills-share
      MINIO_ROOT_PASSWORD: ai-skills-share-dev
    ports:
      - "9000:9000"
      - "9001:9001"
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 5s
      retries: 20
    volumes:
      - minio-data:/data

  minio-init:
    image: minio/minio:RELEASE.2025-09-07T16-13-09Z
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        mc alias set local http://minio:9000 ai-skills-share ai-skills-share-dev
        mc mb --ignore-existing local/ai-skills-share-dev

volumes:
  postgres-data:
  minio-data:
